services:
  redis:
    image: redis:7-alpine
    container_name: tubs-redis
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - tubs-redis-data:/data
    networks:
      - setup_npm

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tubs-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tubs_context}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - tubs-postgres-data:/var/lib/postgresql/data
    networks:
      - setup_npm

  api:
    build: .
    container_name: tubs-api
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    environment:
      # We rely heavily on passing the token from the client, but this acts as an optional fallback
      - DEFAULT_API_KEY=${DEFAULT_API_KEY:-}
      - ENABLE_STOP_TRUNCATION=${ENABLE_STOP_TRUNCATION:-true}
      - TUBS_MAX_CONCURRENT_REQUESTS=${TUBS_MAX_CONCURRENT_REQUESTS:-1}
      - TUBS_MIN_REQUEST_INTERVAL_SECONDS=${TUBS_MIN_REQUEST_INTERVAL_SECONDS:-0}
      - TUBS_MAX_PROMPT_TOKENS=${TUBS_MAX_PROMPT_TOKENS:-9000}
      - TUBS_THREAD_PROMPT_TOKENS=${TUBS_THREAD_PROMPT_TOKENS:-9000}
      - TUBS_USE_UPSTREAM_THREADS=${TUBS_USE_UPSTREAM_THREADS:-true}
      - TUBS_STRICT_WRAPPER_STATE_MODE=${TUBS_STRICT_WRAPPER_STATE_MODE:-false}
      - TUBS_NO_UPSTREAM_THREAD_CLIENTS=${TUBS_NO_UPSTREAM_THREAD_CLIENTS:-}
      - TUBS_STRICT_WRAPPER_STATE_CLIENTS=${TUBS_STRICT_WRAPPER_STATE_CLIENTS:-}
      - TUBS_NO_UPSTREAM_THREAD_ENDPOINTS=${TUBS_NO_UPSTREAM_THREAD_ENDPOINTS:-}
      - TUBS_KEEP_LAST_TURNS=${TUBS_KEEP_LAST_TURNS:-8}
      - TUBS_COMPACT_SUMMARY_CHARS=${TUBS_COMPACT_SUMMARY_CHARS:-4000}
      - TUBS_THREAD_SUMMARY_CHARS=${TUBS_THREAD_SUMMARY_CHARS:-1200}
      - TUBS_APPROX_CHARS_PER_TOKEN=${TUBS_APPROX_CHARS_PER_TOKEN:-4}
      - TUBS_THREAD_CACHE_BACKEND=${TUBS_THREAD_CACHE_BACKEND:-redis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TUBS_THREAD_CACHE_TTL_SECONDS=${TUBS_THREAD_CACHE_TTL_SECONDS:-21600}
      - TUBS_ENABLE_STAGED_INGESTION=${TUBS_ENABLE_STAGED_INGESTION:-true}
      - TUBS_STAGED_INGEST_THRESHOLD_TOKENS=${TUBS_STAGED_INGEST_THRESHOLD_TOKENS:-7000}
      - TUBS_STAGED_INGEST_BLOCK_TOKENS=${TUBS_STAGED_INGEST_BLOCK_TOKENS:-2200}
      - TUBS_STAGED_INGEST_MAX_BLOCKS=${TUBS_STAGED_INGEST_MAX_BLOCKS:-12}
      - TUBS_STAGED_INGEST_LEDGER_CHARS=${TUBS_STAGED_INGEST_LEDGER_CHARS:-1200}
      - TUBS_CONTEXT_DATABASE_URL=${TUBS_CONTEXT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/tubs_context}
      - TUBS_CONTEXT_HOT_BACKEND=${TUBS_CONTEXT_HOT_BACKEND:-redis}
      - TUBS_CONTEXT_HOT_TTL_SECONDS=${TUBS_CONTEXT_HOT_TTL_SECONDS:-21600}
      - TUBS_CONTEXT_HOT_PREFIX=${TUBS_CONTEXT_HOT_PREFIX:-tubs:context:hot:}
      - TUBS_CONTEXT_TOOLS_ENABLED=${TUBS_CONTEXT_TOOLS_ENABLED:-true}
      - TUBS_CONTEXT_TOOL_LOOP_LIMIT=${TUBS_CONTEXT_TOOL_LOOP_LIMIT:-4}
      - TUBS_REQUIRED_CONTEXT_RETRIEVALS=${TUBS_REQUIRED_CONTEXT_RETRIEVALS:-1}
      - TUBS_CONTEXT_EMBEDDING_DIMENSIONS=${TUBS_CONTEXT_EMBEDDING_DIMENSIONS:-64}
      - TUBS_LOW_INFORMATION_POISON_LIMIT=${TUBS_LOW_INFORMATION_POISON_LIMIT:-2}
      - TUBS_POISON_DISABLE_MINUTES=${TUBS_POISON_DISABLE_MINUTES:-30}
      - TUBS_DEBUG_TRACE_ENABLED=${TUBS_DEBUG_TRACE_ENABLED:-false}
      - TUBS_DEBUG_TRACE_MAX_EVENTS=${TUBS_DEBUG_TRACE_MAX_EVENTS:-120}
      - TUBS_DEBUG_TRACE_PREFIX=${TUBS_DEBUG_TRACE_PREFIX:-tubs:debug:}
      # Optional: Override default Anthropic model mappings
      # - ANTHROPIC_MODEL_MAP={"claude-3-5-sonnet-20241022": "gpt-4o", "claude-3-opus-20240229": "gpt-5.4"}
    volumes:
      - ./app:/app/app
    networks:
      - setup_npm

networks:
  setup_npm:
    external: true

volumes:
  tubs-postgres-data:
  tubs-redis-data:
