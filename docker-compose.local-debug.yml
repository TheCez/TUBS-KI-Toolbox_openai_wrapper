services:
  postgres:
    networks: []

  api:
    environment:
      - TUBS_MAX_PROMPT_TOKENS=${TUBS_MAX_PROMPT_TOKENS:-9000}
      - TUBS_THREAD_PROMPT_TOKENS=${TUBS_THREAD_PROMPT_TOKENS:-9000}
      - TUBS_USE_UPSTREAM_THREADS=${TUBS_USE_UPSTREAM_THREADS:-true}
      - TUBS_KEEP_LAST_TURNS=${TUBS_KEEP_LAST_TURNS:-8}
      - TUBS_COMPACT_SUMMARY_CHARS=${TUBS_COMPACT_SUMMARY_CHARS:-4000}
      - TUBS_THREAD_SUMMARY_CHARS=${TUBS_THREAD_SUMMARY_CHARS:-1200}
      - TUBS_APPROX_CHARS_PER_TOKEN=${TUBS_APPROX_CHARS_PER_TOKEN:-4}
      - TUBS_ENABLE_STAGED_INGESTION=${TUBS_ENABLE_STAGED_INGESTION:-true}
      - TUBS_STAGED_INGEST_THRESHOLD_TOKENS=${TUBS_STAGED_INGEST_THRESHOLD_TOKENS:-7000}
      - TUBS_STAGED_INGEST_BLOCK_TOKENS=${TUBS_STAGED_INGEST_BLOCK_TOKENS:-2200}
      - TUBS_STAGED_INGEST_MAX_BLOCKS=${TUBS_STAGED_INGEST_MAX_BLOCKS:-12}
      - TUBS_STAGED_INGEST_LEDGER_CHARS=${TUBS_STAGED_INGEST_LEDGER_CHARS:-1200}
      - TUBS_CONTEXT_DATABASE_URL=${TUBS_CONTEXT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/tubs_context}
      - TUBS_CONTEXT_HOT_BACKEND=${TUBS_CONTEXT_HOT_BACKEND:-redis}
      - TUBS_CONTEXT_HOT_TTL_SECONDS=${TUBS_CONTEXT_HOT_TTL_SECONDS:-21600}
      - TUBS_CONTEXT_HOT_PREFIX=${TUBS_CONTEXT_HOT_PREFIX:-tubs:context:hot:}
      - TUBS_CONTEXT_TOOLS_ENABLED=${TUBS_CONTEXT_TOOLS_ENABLED:-true}
      - TUBS_CONTEXT_TOOL_LOOP_LIMIT=${TUBS_CONTEXT_TOOL_LOOP_LIMIT:-4}
      - TUBS_CONTEXT_EMBEDDING_DIMENSIONS=${TUBS_CONTEXT_EMBEDDING_DIMENSIONS:-64}
    networks: []
